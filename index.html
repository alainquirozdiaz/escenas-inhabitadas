<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Video Interactivo</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
  }

  video {
    position: fixed;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
  }

  .overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    pointer-events: none;
  }

  .buttons {
    display: none;
    gap: 20px;
    pointer-events: all;
  }

  /* BOTONES DE OPCIONES */
  .buttons button {
    padding: 16px 32px;
    font-size: 18px;
    border-radius: 14px;
    border: 2px solid white;
    cursor: pointer;
    background: rgba(0,0,0,0.75);
    color: white;
    box-shadow: 0 6px 25px rgba(0,0,0,0.6);
    text-shadow: 0 2px 5px rgba(0,0,0,0.8);
    transition: 0.25s;
  }

  .buttons button:hover {
    background: white;
    color: black;
    transform: scale(1.08);
  }

  /* 🔥 BOTÓN FINAL (oculto correctamente) */
  #finalButton {
    display: none;
    margin-top: 20px;
    pointer-events: all;

    padding: 16px 32px;
    font-size: 18px;
    border-radius: 14px;
    border: 2px solid white;
    cursor: pointer;

    background: rgba(0,0,0,0.75);
    color: white;

    box-shadow: 0 6px 25px rgba(0,0,0,0.6);
    text-shadow: 0 2px 5px rgba(0,0,0,0.8);

    align-items: center;
    gap: 10px;

    transition: 0.25s;
  }

  #finalButton:hover {
    background: white;
    color: black;
    transform: scale(1.08);
  }

  button {
    padding: 12px 25px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: rgba(255,255,255,0.2);
    color: white;
  }

  #startScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 5;
  }

  #controls {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 3;
  }
</style>
</head>

<body>

<video id="video" muted playsinline></video>

<div id="startScreen">
  <button onclick="start()">Iniciar</button>
</div>

<div class="overlay">
  <div class="buttons" id="options">
    <button onclick="playVideo('Rough_Agite.mp4')">Agité</button>
    <button onclick="playVideo('Rough_OFicinaCentral.mp4')">Oficina</button>
    <button onclick="playVideo('Rough_PequenoTeatro.mp4')">Teatro</button>
  </div>

  <!-- 🔥 SOLO APARECE AL FINAL -->
  <button id="finalButton" onclick="goToLink()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12.75 2h2.25c.2 1.9 1.7 3.4 3.6 3.6v2.3c-1.3-.1-2.5-.5-3.6-1.2v7.4c0 3.2-2.6 5.8-5.8 5.8s-5.8-2.6-5.8-5.8 2.6-5.8 5.8-5.8c.3 0 .6 0 .9.1v2.4c-.3-.1-.6-.2-.9-.2-1.9 0-3.4 1.5-3.4 3.4s1.5 3.4 3.4 3.4 3.4-1.5 3.4-3.4V2z"/>
    </svg>
    Tik Tok
  </button>
</div>

<div id="controls">
  <button onclick="skip()">⏭</button>
</div>

<script>
  const video = document.getElementById("video");
  const options = document.getElementById("options");
  const finalButton = document.getElementById("finalButton");
  const startScreen = document.getElementById("startScreen");

  let isIntro = true;

  function start() {
    startScreen.style.display = "none";
    loadVideo("Rough_Intro(Todo).mp4", true);
  }

  function loadVideo(src, intro = false) {
    isIntro = intro;

    video.pause();
    video.src = src;
    video.load();

    video.onloadeddata = () => {
      video.currentTime = 0;
      video.play().catch(() => {});
    };
  }

  video.addEventListener("ended", () => {
    if (isIntro) {
      options.style.display = "flex";
    } else {
      finalButton.style.display = "flex"; // 🔥 aparece aquí
    }
  });

  function playVideo(src) {
    options.style.display = "none";
    finalButton.style.display = "none";

    loadVideo(src, false);
  }

  function skip() {
    video.pause();

    if (isIntro) {
      options.style.display = "flex";
      isIntro = false;
    } else {
      finalButton.style.display = "flex";
    }
  }

  function goToLink() {
    window.location.href = "https://www.tiktok.com/@escenas_inhabitadas?_r=1&_t=ZS-95hnxZTzgVZ";
  }
</script>

</body>
</html>
