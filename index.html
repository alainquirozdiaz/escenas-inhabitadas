<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Video Interactivo</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      font-family: Arial, sans-serif;
    }

    video {
      max-width: 90%;
      max-height: 80%;
      background: black;
    }

    .buttons {
      margin-top: 20px;
      display: none;
      gap: 10px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background: #ffffff;
    }

    #finalButton {
      display: none;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <video id="videoPlayer" controls autoplay>
    <source src="Rough_Intro(Todo).mp4" type="video/mp4">
    Tu navegador no soporta video.
  </video>

  <div class="buttons" id="choiceButtons">
    <button onclick="playVideo('Rough_Agité.mp4')">Opción 1</button>
    <button onclick="playVideo('Rough_OFicinaCentral.mp4')">Opción 2</button>
    <button onclick="playVideo('Rough_PequeñoTeatro.mp4')">Opción 3</button>
  </div>

  <button id="finalButton" onclick="goToLink()">
    Ir al siguiente paso
  </button>

  <script>
    const video = document.getElementById("videoPlayer");
    const buttons = document.getElementById("choiceButtons");
    const finalButton = document.getElementById("finalButton");

    let introFinished = false;

    video.onended = () => {
      if (!introFinished) {
        // Terminó el intro
        introFinished = true;
        buttons.style.display = "flex";
      } else {
        // Terminó un video elegido
        finalButton.style.display = "block";
      }
    };

    function playVideo(src) {
      buttons.style.display = "none";
      finalButton.style.display = "none";

      video.src = src;
      video.play();
    }

    function goToLink() {
      window.location.href = "https://www.google.com"; // cámbialo si quieres
    }
  </script>

</body>
</html>
