<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Video Interactivo</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
  }

  video {
    position: fixed;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    top: 0;
    left: 0;
    opacity: 0;
    transition: opacity 1s ease; /* 🔥 duración del crossfade */
  }

  video.active {
    opacity: 1;
    z-index: 2;
  }

  video.background {
    z-index: 1;
  }

  .overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }

  .buttons {
    display: none;
    gap: 20px;
  }

  button {
    padding: 15px 30px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: rgba(255,255,255,0.15);
    color: white;
    backdrop-filter: blur(10px);
    transition: 0.3s;
  }

  button:hover {
    background: white;
    color: black;
  }

  #finalButton {
    display: none;
    margin-top: 20px;
  }

</style>
</head>

<body>

<!-- 🎬 VIDEOS -->
<video id="intro" class="active" preload="auto">
  <source src="Rough_Intro(Todo).mp4" type="video/mp4">
</video>

<video id="v1" preload="auto">
  <source src="Rough_Agité.mp4" type="video/mp4">
</video>

<video id="v2" preload="auto">
  <source src="Rough_OFicinaCentral.mp4" type="video/mp4">
</video>

<video id="v3" preload="auto">
  <source src="Rough_PequeñoTeatro.mp4" type="video/mp4">
</video>

<div class="overlay">
  <div class="buttons" id="buttons">
    <button onclick="play('v1')">Agité</button>
    <button onclick="play('v2')">Oficina</button>
    <button onclick="play('v3')">Teatro</button>
  </div>

  <button id="finalButton" onclick="goToLink()">Continuar</button>
</div>

<script>
  const videos = {
    intro: document.getElementById("intro"),
    v1: document.getElementById("v1"),
    v2: document.getElementById("v2"),
    v3: document.getElementById("v3")
  };

  const buttons = document.getElementById("buttons");
  const finalButton = document.getElementById("finalButton");

  let current = videos.intro;

  // ▶️ iniciar intro
  current.play();

  current.onended = () => {
    buttons.style.display = "flex";
  };

  function crossfade(toVideo) {
    const next = videos[toVideo];

    // preparar siguiente video
    next.currentTime = 0;
    next.classList.add("active");
    next.classList.add("background");
    next.play();

    // 🔥 crossfade
    current.classList.remove("active");

    // limpiar después del fade
    setTimeout(() => {
      current.pause();
      current.classList.remove("background");
      current = next;
    }, 1000); // igual al CSS transition

    current = next;
  }

  function play(id) {
    buttons.style.display = "none";
    finalButton.style.display = "none";

    crossfade(id);

    videos[id].onended = () => {
      finalButton.style.display = "block";
    };
  }

  function goToLink() {
    window.location.href = "https://www.google.com";
  }
</script>

</body>
</html>
